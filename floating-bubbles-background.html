<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Floating Bubbles Background</title>
  <style>
    /* ─── Reset & Base ─────────────────────────────────────────────── */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    /* ─── Background Canvas ─────────────────────────────────────────── */
    .scene {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 30% 70%, #0d0628 0%, #0a0a1a 40%, #050510 100%);
      overflow: hidden;
      z-index: 0;
    }

    /* Subtle background stars / noise overlay */
    .scene::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.08) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 10%, rgba(255,255,255,0.06) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 60%, rgba(255,255,255,0.05) 0%, transparent 100%),
        radial-gradient(1px 1px at 40% 80%, rgba(255,255,255,0.07) 0%, transparent 100%);
      pointer-events: none;
    }

    /* ─── Bubble Base ───────────────────────────────────────────────── */
    .bubble {
      position: absolute;
      bottom: -200px;             /* start below the viewport        */
      border-radius: 50%;
      pointer-events: none;
      will-change: transform, opacity;

      /* Glass morphism look */
      background: radial-gradient(
        circle at 35% 35%,
        rgba(255,255,255,0.18) 0%,
        rgba(255,255,255,0.04) 60%,
        rgba(255,255,255,0.01) 100%
      );
      border: 1px solid rgba(255, 255, 255, 0.12);

      /* Glow */
      box-shadow:
        0 0 12px rgba(160, 100, 255, 0.25),
        0 0 30px rgba(100, 160, 255, 0.12),
        inset 0 0 20px rgba(255,255,255,0.05);

      animation: floatUp var(--duration) ease-in infinite;
      animation-delay: var(--delay);
    }

    /* Inner shimmer highlight */
    .bubble::before {
      content: '';
      position: absolute;
      top: 18%;
      left: 22%;
      width: 28%;
      height: 18%;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.35);
      filter: blur(3px);
      transform: rotate(-25deg);
    }

    /* ─── Float-up Keyframe ─────────────────────────────────────────── */
    @keyframes floatUp {
      0% {
        transform: translateY(0) translateX(0) scale(1);
        opacity: 0;
      }
      5% {
        opacity: var(--opacity);
      }
      50% {
        transform: translateY(-50vh) translateX(var(--drift)) scale(var(--mid-scale));
      }
      95% {
        opacity: var(--opacity);
      }
      100% {
        transform: translateY(-110vh) translateX(calc(var(--drift) * 1.6)) scale(0.85);
        opacity: 0;
      }
    }

    /* ─── Demo Content (optional – remove for production) ──────────── */
    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 2rem;
      color: #fff;
    }

    .content h1 {
      font-size: clamp(2rem, 6vw, 4.5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #c8b8ff 0%, #82cfff 50%, #c8b8ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }

    .content p {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      color: rgba(200, 210, 255, 0.65);
      max-width: 520px;
      line-height: 1.7;
    }
  </style>
</head>
<body>

  <!-- ── Background Scene ──────────────────────────────────────────── -->
  <div class="scene" id="scene" aria-hidden="true"></div>

  <!-- ── Optional Demo Content ─────────────────────────────────────── -->
  <div class="content">
    <h1>Floating Bubbles</h1>
    <p>A smooth, performant animated bubble background. Drop this into any project and remove the demo content above.</p>
  </div>

  <script>
    (() => {
      'use strict';

      /* ── Configuration ───────────────────────────────────────────── */
      const CONFIG = {
        count: 28,           // total bubbles in the pool
        minSize: 14,         // px
        maxSize: 90,         // px
        minDuration: 10,     // seconds
        maxDuration: 28,     // seconds
        minOpacity: 0.30,
        maxOpacity: 0.70,
        maxDrift: 120,       // px  horizontal sway
        spawnInterval: 600,  // ms between new bubble spawns
      };

      /* Palette – hue ranges for the glow tint */
      const TINTS = [
        'rgba(130, 80, 255, VAL)',   // violet
        'rgba(80, 160, 255, VAL)',   // blue
        'rgba(180, 100, 255, VAL)',  // purple
        'rgba(80, 220, 200, VAL)',   // teal
        'rgba(120, 100, 255, VAL)',  // indigo
      ];

      /* ── Helpers ─────────────────────────────────────────────────── */
      const rand  = (min, max) => Math.random() * (max - min) + min;
      const randInt = (min, max) => Math.floor(rand(min, max + 1));
      const pick  = arr => arr[randInt(0, arr.length - 1)];

      /* ── Bubble Factory ──────────────────────────────────────────── */
      function createBubble(scene) {
        const size     = rand(CONFIG.minSize, CONFIG.maxSize);
        const duration = rand(CONFIG.minDuration, CONFIG.maxDuration);
        const delay    = rand(0, 6);
        const opacity  = rand(CONFIG.minOpacity, CONFIG.maxOpacity);
        const drift    = rand(-CONFIG.maxDrift, CONFIG.maxDrift);
        const midScale = rand(0.95, 1.08);
        const leftPct  = rand(2, 96);           // horizontal spawn position
        const tint     = pick(TINTS).replace('VAL', (opacity * 0.7).toFixed(2));
        const tint2    = pick(TINTS).replace('VAL', (opacity * 0.4).toFixed(2));

        const el = document.createElement('div');
        el.className = 'bubble';

        Object.assign(el.style, {
          width:        `${size}px`,
          height:       `${size}px`,
          left:         `${leftPct}%`,
          '--duration':  `${duration}s`,
          '--delay':     `${delay}s`,
          '--opacity':   opacity,
          '--drift':     `${drift}px`,
          '--mid-scale': midScale,
          boxShadow: `
            0 0 ${size * 0.4}px ${tint},
            0 0 ${size * 0.8}px ${tint2},
            inset 0 0 ${size * 0.25}px rgba(255,255,255,0.06)
          `,
        });

        scene.appendChild(el);
        return el;
      }

      /* ── Lifecycle: recycle bubble when animation ends ───────────── */
      function recycleBubble(el, scene) {
        /* Re-randomise properties so every loop looks different */
        const size     = rand(CONFIG.minSize, CONFIG.maxSize);
        const duration = rand(CONFIG.minDuration, CONFIG.maxDuration);
        const opacity  = rand(CONFIG.minOpacity, CONFIG.maxOpacity);
        const drift    = rand(-CONFIG.maxDrift, CONFIG.maxDrift);
        const leftPct  = rand(2, 96);
        const tint     = pick(TINTS).replace('VAL', (opacity * 0.7).toFixed(2));
        const tint2    = pick(TINTS).replace('VAL', (opacity * 0.4).toFixed(2));

        Object.assign(el.style, {
          width:        `${size}px`,
          height:       `${size}px`,
          left:         `${leftPct}%`,
          '--duration':  `${duration}s`,
          '--delay':     '0s',           // no delay on recycle
          '--opacity':   opacity,
          '--drift':     `${drift}px`,
          boxShadow: `
            0 0 ${size * 0.4}px ${tint},
            0 0 ${size * 0.8}px ${tint2},
            inset 0 0 ${size * 0.25}px rgba(255,255,255,0.06)
          `,
        });

        /* Force reflow to restart the CSS animation */
        el.style.animation = 'none';
        // eslint-disable-next-line no-void
        void el.offsetWidth;
        el.style.animation = '';
      }

      /* ── Init ────────────────────────────────────────────────────── */
      function init() {
        const scene = document.getElementById('scene');
        if (!scene) return;

        // Create initial pool of bubbles (staggered delays so screen
        // isn't empty on load)
        for (let i = 0; i < CONFIG.count; i++) {
          const el = createBubble(scene);

          /* Listen for animation end to recycle this bubble */
          el.addEventListener('animationiteration', () => {
            recycleBubble(el, scene);
          });
        }

        /* Spawn a few extra bubbles gradually after page load
           to give a more organic feel on first view              */
        let extraSpawned = 0;
        const maxExtra   = 8;
        const spawnTimer = setInterval(() => {
          if (extraSpawned >= maxExtra) {
            clearInterval(spawnTimer);
            return;
          }
          const el = createBubble(scene);
          el.addEventListener('animationiteration', () => {
            recycleBubble(el, scene);
          });
          extraSpawned++;
        }, CONFIG.spawnInterval);
      }

      /* ── Performance: pause animation when tab is hidden ─────────── */
      document.addEventListener('visibilitychange', () => {
        const scene = document.getElementById('scene');
        if (!scene) return;
        scene.style.animationPlayState =
          document.hidden ? 'paused' : 'running';
      });

      /* Kick off after DOM is ready */
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
</body>
</html>
